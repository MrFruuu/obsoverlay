<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OBS Overlay Editor</title>
  <style>
    :root{--bg:#0b0b0b;--panel:#111;--border:#222;--text:#fff}
    body{margin:0;font-family:Arial;background:var(--bg);color:var(--text)}
    .app{display:grid;grid-template-columns:420px 1fr;min-height:100vh}
    .panel{padding:16px;border-right:1px solid var(--border);background:var(--panel)}
    .panel h2{margin:0 0 10px}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0}
    input,select,button{padding:8px;border-radius:10px;border:1px solid var(--border);background:#0f0f0f;color:#fff}
    input[type="number"]{width:90px}
    button{cursor:pointer}
    .game{border:1px solid var(--border);border-radius:12px;padding:12px;margin:10px 0;background:#0f0f0f}
    .game b{display:block;margin-bottom:6px}
    .hint{opacity:.75;font-size:12px;line-height:1.3}

    /* PREVIEW (overlay) */
    .previewWrap{padding:16px}
    .overlay{
      background:transparent;
      display:flex;
      gap:10px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .card{
      width:140px;
      text-align:center;
      color:white;
    }
    .card img{
      width:140px;
      height:80px;
      object-fit:cover;
      border-radius:8px;
      background:#000;
    }
    .name{
      background:#111;
      padding:6px 6px;
      font-size:14px;
      border-radius:8px;
      margin-top:6px;
    }
    .result{
      font-size:28px;
      font-weight:800;
      margin-top:6px;
      height:34px;
    }
    .win{color:lime}
    .lose{color:red}

    /* helper */
    .split{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  </style>
</head>
<body>
<div class="app">
  <!-- CONTROLLO -->
  <div class="panel">
    <h2>Editor Overlay</h2>

    <div class="row">
      <span>Numero giochi:</span>
      <input id="count" type="number" min="1" max="30" value="10" />
      <button id="applyBtn">Applica</button>
    </div>

    <div class="row">
      <button id="saveBtn">Salva</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="hint">
      ✅ Le immagini vengono prese dal tuo PC e salvate nel browser (localStorage).<br>
      ✅ Apri questo stesso sito anche dentro OBS (Browser Source) per vedere l’overlay.<br>
      ⚠️ Se apri il sito su un altro PC/browser, non avrà le tue immagini (perché sono locali).
    </div>

    <div id="editor"></div>
  </div>

  <!-- PREVIEW -->
  <div class="previewWrap">
    <h2 style="margin:0 0 10px">Preview (Overlay)</h2>
    <div class="overlay" id="overlay"></div>
  </div>
</div>

<script>
  const LS_KEY = "obsOverlayGames_v1";

  function loadGames(){
    try{
      const raw = localStorage.getItem(LS_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){
      return [];
    }
  }

  function saveGames(games){
    localStorage.setItem(LS_KEY, JSON.stringify(games));
  }

  let games = loadGames();

  function ensureCount(n){
    n = Number(n) || 1;
    while(games.length < n){
      games.push({ name: "Game", state: "", imageData: "" });
    }
    games.length = n;
  }

  function fileToDataURL(file){
    return new Promise((resolve,reject)=>{
      const r = new FileReader();
      r.onload = () => resolve(String(r.result || ""));
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  function drawEditor(){
    const ed = document.getElementById("editor");
    ed.innerHTML = "";

    games.forEach((g,i)=>{
      const div = document.createElement("div");
      div.className = "game";
      div.innerHTML = `
        <b>Gioco ${i+1}</b>

        <div class="row">
          <span>Nome:</span>
          <input value="${escapeHtml(g.name)}" data-i="${i}" data-k="name" />
        </div>

        <div class="row split">
          <span>Stato:</span>
          <select data-i="${i}" data-k="state">
            <option value="" ${g.state===""?"selected":""}>---</option>
            <option value="win" ${g.state==="win"?"selected":""}>✔ WIN</option>
            <option value="lose" ${g.state==="lose"?"selected":""}>✖ LOSE</option>
          </select>

          <button data-action="clearState" data-i="${i}">Togli</button>
        </div>

        <div class="row split">
          <span>Immagine:</span>
          <input type="file" accept="image/*" data-action="pickImage" data-i="${i}" />
          <button data-action="clearImage" data-i="${i}">Rimuovi</button>
        </div>

        <div class="hint">Suggerimento: PNG/JPG. Se l’immagine è enorme, può appesantire OBS.</div>
      `;
      ed.appendChild(div);
    });

    // bind input name
    ed.querySelectorAll('input[data-k="name"]').forEach(inp=>{
      inp.addEventListener("input", (e)=>{
        const i = Number(e.target.dataset.i);
        games[i].name = e.target.value;
        drawOverlay();
      });
    });

    // bind select state
    ed.querySelectorAll('select[data-k="state"]').forEach(sel=>{
      sel.addEventListener("change", (e)=>{
        const i = Number(e.target.dataset.i);
        games[i].state = e.target.value;
        drawOverlay();
      });
    });

    // bind buttons + file pickers
    ed.querySelectorAll('[data-action]').forEach(el=>{
      const action = el.dataset.action;
      const i = Number(el.dataset.i);

      if(action === "pickImage"){
        el.addEventListener("change", async (e)=>{
          const file = e.target.files && e.target.files[0];
          if(!file) return;
          const dataUrl = await fileToDataURL(file);
          games[i].imageData = dataUrl;
          drawOverlay();
          // reset input so you can pick same file again
          e.target.value = "";
        });
      } else {
        el.addEventListener("click", ()=>{
          if(action === "clearImage"){
            games[i].imageData = "";
            drawOverlay();
          }
          if(action === "clearState"){
            games[i].state = "";
            drawOverlay();
          }
        });
      }
    });
  }

  function drawOverlay(){
    const wrap = document.getElementById("overlay");
    wrap.innerHTML = "";

    games.forEach(g=>{
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = g.imageData || "";
      img.alt = g.name || "game";
      card.appendChild(img);

      const name = document.createElement("div");
      name.className = "name";
      name.textContent = g.name || "";
      card.appendChild(name);

      const res = document.createElement("div");
      res.className = "result " + (g.state==="win"?"win":(g.state==="lose"?"lose":""));
      res.textContent = g.state==="win" ? "✔" : (g.state==="lose" ? "✖" : "");
      card.appendChild(res);

      wrap.appendChild(card);
    });
  }

  function escapeHtml(s){
    return String(s||"")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;");
  }

  // UI Buttons
  document.getElementById("applyBtn").addEventListener("click", ()=>{
    const n = document.getElementById("count").value;
    ensureCount(n);
    drawEditor();
    drawOverlay();
  });

  document.getElementById("saveBtn").addEventListener("click", ()=>{
    saveGames(games);
    alert("Salvato! (resta nel browser di questo PC)");
  });

  document.getElementById("resetBtn").addEventListener("click", ()=>{
    if(confirm("Reset totale?")){
      games = [];
      localStorage.removeItem(LS_KEY);
      ensureCount(document.getElementById("count").value);
      drawEditor();
      drawOverlay();
    }
  });

  // Init
  if(games.length === 0){
    ensureCount(document.getElementById("count").value);
  } else {
    document.getElementById("count").value = games.length;
  }
  drawEditor();
  drawOverlay();

  // Sync: se hai l’overlay aperto in OBS e l’editor nel browser,
  // quando premi "Salva" qui, OBS si aggiorna (evento storage).
  window.addEventListener("storage", (e)=>{
    if(e.key === LS_KEY){
      games = loadGames();
      drawEditor();
      drawOverlay();
    }
  });
</script>
</body>
</html>
