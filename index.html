<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<title>OBS Overlay</title>
<style>
body{
  margin:0;
  background:transparent;
  font-family:Arial;
}

/* OVERLAY */
.overlay{
  display:flex;
  gap:12px;
  padding:10px;
}

/* CARD */
.card{
  width:150px;
  background:#1a1a1a;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  text-align:center;
}

.card img{
  width:100%;
  height:90px;
  object-fit:cover;
}

/* NOME */
.name{
  font-size:13px;
  padding:6px;
  background:#111;
  color:white;
}

/* BADGE */
.badge{
  padding:6px;
  font-weight:bold;
  font-size:12px;
}

.win{
  background:#2ecc71;
}

.lose{
  background:#e74c3c;
}

.none{
  background:#333;
}
</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<script>
const LS_KEY = "obsOverlayGames_v1";

function load(){
  return JSON.parse(localStorage.getItem(LS_KEY)) || [];
}

function draw(){
  const data = load();
  const container = document.getElementById("overlay");
  container.innerHTML = "";

  data.forEach(g=>{
    let stateText = "";
    let stateClass = "none";

    if(g.state==="win"){
      stateText="WIN";
      stateClass="win";
    }
    else if(g.state==="lose"){
      stateText="LOSE";
      stateClass="lose";
    }
    else{
      stateText="";
    }

    container.innerHTML += `
    <div class="card">
      <img src="${g.imageData || ""}">
      <div class="name">${g.name}</div>
      <div class="badge ${stateClass}">
        ${stateText}
      </div>
    </div>`;
  });
}

setInterval(draw,500);
draw();
</script>

</body>
</html>
